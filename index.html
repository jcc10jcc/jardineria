<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión Jardinería</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:20px;background:#111;color:#fff}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:none}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin-top:15px}
</style>
</head>
<body>

<h1>🌿 Gestión Jardinería</h1>

<select id="tipo">
<option value="ingreso">Ingreso</option>
<option value="gasto">Gasto</option>
</select>

<input id="concepto" placeholder="Concepto">
<input id="importe" type="number" placeholder="Importe">

<button onclick="guardar()">Guardar</button>

<div class="card">
<h2>Resumen</h2>
<p id="ingresos">Ingresos: 0€</p>
<p id="gastos">Gastos: 0€</p>
<p id="beneficio">Beneficio: 0€</p>
</div>

<div class="card">
<h2>Datos</h2>
<div id="lista"></div>
</div>

<script>
const supabase = window.supabase.createClient(
"TU_URL_SUPABASE",
"TU_API_KEY"
);

async function cargar(){
let {data} = await supabase.from("registros").select("*");
let ingresos=0, gastos=0;
let html="";

data.forEach(d=>{
html += `<p>${d.tipo} - ${d.concepto} - ${d.importe}€</p>`;
if(d.tipo==="ingreso") ingresos+=Number(d.importe);
else gastos+=Number(d.importe);
});

document.getElementById("lista").innerHTML=html;
document.getElementById("ingresos").innerText="Ingresos: "+ingresos+"€";
document.getElementById("gastos").innerText="Gastos: "+gastos+"€";
document.getElementById("beneficio").innerText="Beneficio: "+(ingresos-gastos)+"€";
}

async function guardar(){
let tipo=document.getElementById("tipo").value;
let concepto=document.getElementById("concepto").value;
let importe=document.getElementById("importe").value;

await supabase.from("registros").insert([{tipo,concepto,importe}]);
cargar();
}

cargar();
</script>

</body>
</html>
